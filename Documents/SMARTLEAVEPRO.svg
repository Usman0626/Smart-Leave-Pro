<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117" rx="12"/>
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#58a6ff">SmartLeavePro — Entity Relationship Diagram</text>

  <!-- ── admins ── -->
  <rect x="30" y="60" width="185" height="175" rx="10" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <rect x="30" y="60" width="185" height="38" rx="10" fill="#1f6feb"/>
  <rect x="30" y="88" width="185" height="10" fill="#1f6feb"/>
  <text x="122" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="white">admins</text>
  <text x="45" y="118" font-size="12" fill="#e6edf3">🔑 id (PK, INT, AI)</text>
  <text x="45" y="137" font-size="12" fill="#8b949e">name (VARCHAR 100)</text>
  <text x="45" y="156" font-size="12" fill="#8b949e">email (VARCHAR 150)</text>
  <text x="45" y="175" font-size="12" fill="#8b949e">password (VARCHAR 255)</text>
  <text x="45" y="194" font-size="12" fill="#8b949e">created_at (TIMESTAMP)</text>
  <text x="45" y="220" font-size="10" fill="#58a6ff" font-style="italic">Manages system settings</text>

  <!-- ── managers ── -->
  <rect x="357" y="60" width="185" height="175" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
  <rect x="357" y="60" width="185" height="38" rx="10" fill="#bc8cff"/>
  <rect x="357" y="88" width="185" height="10" fill="#bc8cff"/>
  <text x="449" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="white">managers</text>
  <text x="372" y="118" font-size="12" fill="#e6edf3">🔑 id (PK, INT, AI)</text>
  <text x="372" y="137" font-size="12" fill="#8b949e">name (VARCHAR 100)</text>
  <text x="372" y="156" font-size="12" fill="#8b949e">email (VARCHAR 150)</text>
  <text x="372" y="175" font-size="12" fill="#8b949e">password (VARCHAR 255)</text>
  <text x="372" y="194" font-size="12" fill="#8b949e">created_at (TIMESTAMP)</text>
  <text x="372" y="220" font-size="10" fill="#bc8cff" font-style="italic">Approves/rejects leaves</text>

  <!-- ── employees ── -->
  <rect x="357" y="300" width="185" height="195" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="357" y="300" width="185" height="38" rx="10" fill="#3fb950"/>
  <rect x="357" y="328" width="185" height="10" fill="#3fb950"/>
  <text x="449" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="white">employees</text>
  <text x="372" y="358" font-size="12" fill="#e6edf3">🔑 id (PK, INT, AI)</text>
  <text x="372" y="377" font-size="12" fill="#8b949e">name (VARCHAR 100)</text>
  <text x="372" y="396" font-size="12" fill="#8b949e">email (VARCHAR 150)</text>
  <text x="372" y="415" font-size="12" fill="#8b949e">password (VARCHAR 255)</text>
  <text x="372" y="434" font-size="12" fill="#ffa657">🔗 manager_id (FK)</text>
  <text x="372" y="453" font-size="12" fill="#8b949e">created_at (TIMESTAMP)</text>
  <text x="372" y="477" font-size="10" fill="#3fb950" font-style="italic">Submits leave requests</text>

  <!-- ── leave_requests ── -->
  <rect x="660" y="180" width="210" height="235" rx="10" fill="#161b22" stroke="#f78166" stroke-width="2"/>
  <rect x="660" y="180" width="210" height="38" rx="10" fill="#f78166"/>
  <rect x="660" y="208" width="210" height="10" fill="#f78166"/>
  <text x="765" y="204" text-anchor="middle" font-size="13" font-weight="bold" fill="white">leave_requests</text>
  <text x="675" y="234" font-size="12" fill="#e6edf3">🔑 id (PK, INT, AI)</text>
  <text x="675" y="253" font-size="12" fill="#ffa657">🔗 employee_id (FK)</text>
  <text x="675" y="272" font-size="12" fill="#8b949e">leave_type (ENUM)</text>
  <text x="675" y="291" font-size="12" fill="#8b949e">start_date (DATE)</text>
  <text x="675" y="310" font-size="12" fill="#8b949e">end_date (DATE)</text>
  <text x="675" y="329" font-size="12" fill="#8b949e">reason (TEXT)</text>
  <text x="675" y="348" font-size="12" fill="#8b949e">status (ENUM)</text>
  <text x="675" y="367" font-size="12" fill="#8b949e">manager_remark (VARCHAR)</text>
  <text x="675" y="386" font-size="12" fill="#8b949e">created_at (TIMESTAMP)</text>
  <text x="675" y="403" font-size="10" fill="#f78166" font-style="italic">Sick | Casual | Annual</text>

  <!-- ── leave_balance ── -->
  <rect x="660" y="440" width="210" height="155" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="2"/>
  <rect x="660" y="440" width="210" height="38" rx="10" fill="#e3b341"/>
  <rect x="660" y="468" width="210" height="10" fill="#e3b341"/>
  <text x="765" y="464" text-anchor="middle" font-size="13" font-weight="bold" fill="white">leave_balance</text>
  <text x="675" y="494" font-size="12" fill="#e6edf3">🔑 id (PK, INT, AI)</text>
  <text x="675" y="513" font-size="12" fill="#ffa657">🔗 employee_id (FK, UNIQUE)</text>
  <text x="675" y="532" font-size="12" fill="#8b949e">total_leaves (INT, def 20)</text>
  <text x="675" y="551" font-size="12" fill="#8b949e">used_leaves (INT)</text>
  <text x="675" y="570" font-size="12" fill="#8b949e">remaining_leaves (INT)</text>

  <!-- ── RELATIONSHIPS ── -->
  <!-- managers → employees (1:N) via manager_id FK -->
  <!-- Line from bottom of managers (449, 235) to top of employees (449, 300) -->
  <line x1="449" y1="235" x2="449" y2="300" stroke="#bc8cff" stroke-width="1.8" stroke-dasharray="6,3"/>
  <!-- crow's foot at employees end (many) -->
  <line x1="440" y1="298" x2="449" y2="290" stroke="#bc8cff" stroke-width="1.8"/>
  <line x1="458" y1="298" x2="449" y2="290" stroke="#bc8cff" stroke-width="1.8"/>
  <!-- one at managers end -->
  <circle cx="449" cy="238" r="4" fill="none" stroke="#bc8cff" stroke-width="1.8"/>
  <!-- label -->
  <text x="455" y="272" font-size="10" fill="#bc8cff">1 : N</text>

  <!-- employees → leave_requests (1:N) via employee_id -->
  <line x1="542" y1="395" x2="660" y2="310" stroke="#f78166" stroke-width="1.8" stroke-dasharray="6,3"/>
  <line x1="650" y1="306" x2="660" y2="316" stroke="#f78166" stroke-width="1.8"/>
  <line x1="658" y1="302" x2="660" y2="316" stroke="#f78166" stroke-width="1.8"/>
  <circle cx="543" cy="394" r="4" fill="none" stroke="#f78166" stroke-width="1.8"/>
  <text x="575" y="343" font-size="10" fill="#f78166">1 : N</text>

  <!-- employees → leave_balance (1:1) via employee_id -->
  <line x1="542" y1="450" x2="660" y2="510" stroke="#e3b341" stroke-width="1.8" stroke-dasharray="6,3"/>
  <circle cx="544" cy="449" r="4" fill="none" stroke="#e3b341" stroke-width="1.8"/>
  <circle cx="659" cy="511" r="4" fill="none" stroke="#e3b341" stroke-width="1.8"/>
  <text x="575" y="493" font-size="10" fill="#e3b341">1 : 1</text>

  <!-- Legend -->
  <rect x="30" y="310" width="280" height="145" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="45" y="332" font-size="12" font-weight="bold" fill="#e6edf3">Legend</text>
  <text x="45" y="352" font-size="12" fill="#e6edf3">🔑  Primary Key (PK)</text>
  <text x="45" y="372" font-size="12" fill="#e6edf3">🔗  Foreign Key (FK)</text>
  <text x="45" y="392" font-size="12" fill="#e6edf3">AI  Auto Increment</text>
  <line x1="45" y1="408" x2="90" y2="408" stroke="#8b949e" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="95" y="412" font-size="11" fill="#8b949e">Relationship line</text>
  <text x="45" y="432" font-size="11" fill="#58a6ff">ENUM status: Pending | Approved | Rejected</text>
  <text x="45" y="448" font-size="11" fill="#58a6ff">ENUM leave_type: Sick | Casual | Annual</text>
</svg>
